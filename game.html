<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#14142b">
  <title>Play | GMaths GameHub</title>
  <link rel="stylesheet" href="assets/css/game.css">
</head>
<body class="game-page">
  <header class="game-toolbar">
    <a class="back-button" href="index.html" aria-label="Back to GameHub"><span aria-hidden="true">←</span> Back to Hub</a>
    <div class="game-identity"><span id="game-grade"></span><strong id="game-title">Loading game…</strong></div>
    <button id="fullscreen-button" type="button" aria-label="Toggle full screen">⛶ <span>Full screen</span></button>
  </header>
  <main class="game-stage">
    <div class="loader" id="game-loader" role="status"><span></span><p>Preparing your adventure…</p></div>
    <iframe class="is-loading" id="game-frame" title="Game" allow="autoplay; fullscreen" allowfullscreen></iframe>
    <section class="load-error" id="load-error" hidden><span aria-hidden="true">!</span><h1>We couldn't load this game</h1><p id="error-message">Please return to the hub and choose another game.</p><a href="index.html">Back to Hub</a></section>
  </main>
  <script src="assets/js/game-loader.js?v=20260716-4" defer></script>
</body>
</html>
