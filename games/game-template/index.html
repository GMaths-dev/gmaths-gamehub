<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#5746cf">
  <title>New GMaths Game</title>
  <link rel="stylesheet" href="./game.css">
</head>
<body>
  <main class="game-shell">
    <header class="game-header"><div><p class="kicker">GMaths Game</p><h1 id="game-title">New game</h1></div><div class="score" aria-live="polite">Score <strong id="score">0</strong></div></header>
    <section class="play-area" id="play-area" aria-label="Game area"><p class="prompt" id="prompt">Replace this sample round in game.js.</p><div class="answers" id="answers"></div><p class="feedback" id="feedback" aria-live="polite"></p></section>
  </main>
  <script src="./config.js"></script><script src="./game.js"></script>
</body>
</html>
